name: Build & GitOps Deploy (dev)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-push-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="dev-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.APP_NAME }}:${{ steps.vars.outputs.tag }}

      # --- GitOps: update deploy repo via PR ---
      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.REPO_HELM }}
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          path: deploy
          persist-credentials: false
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update values (dev)
        working-directory: deploy
        run: |
          FILE="environments/dev/${{ vars.APP_NAME }}-values.yaml"
          yq -i '.image.repository = "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.APP_NAME }}"' "$FILE"
          yq -i '.image.tag = "${{ steps.vars.outputs.tag }}"' "$FILE"
          git diff

      - name: Commit & push branch to deploy repo (forced auth)
        working-directory: deploy
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          BRANCH="pr-gitops-dev-${TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "environments/dev/${{ vars.APP_NAME }}-values.yaml"
          git commit -m "deploy(dev): ${{ vars.APP_NAME }}:${TAG}"

          # Push usando el PAT explícitamente (evita el 403 por credenciales mezcladas)
          git push "https://x-access-token:${{ secrets.DEPLOY_REPO_PAT }}@github.com/${{ vars.REPO_HELM }}.git" "$BRANCH"

      - name: Create PR (gh)
        working-directory: deploy
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_PAT }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          BRANCH="pr-gitops-dev-${TAG}"

          gh --version

          # Si ya existe PR, no falles (idempotente)
          if gh pr list --repo "${{ vars.REPO_HELM }}" --head "$BRANCH" --json number --jq 'length' | grep -q '^1$'; then
            echo "PR already exists for branch $BRANCH"
            exit 0
          fi

          gh pr create \
            --repo "${{ vars.REPO_HELM }}" \
            --base "gitops" \
            --head "$BRANCH" \
            --title "deploy(dev): ${{ vars.APP_NAME }}:${TAG}" \
            --body "Automated GitOps update:\n- image.repository = docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.APP_NAME }}\n- image.tag = ${TAG}"