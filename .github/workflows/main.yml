name: Build & GitOps Deploy (dev)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-push-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="dev-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.APP_NAME }}:${{ steps.vars.outputs.tag }}

      # --- GitOps: update deploy repo via PR ---
      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.REPO_HELM }}
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          path: deploy
          persist-credentials: false
          fetch-depth: 0

      - name: Force git auth for deploy repo
        working-directory: deploy
        run: |
          # Asegura remote correcto
          git remote set-url origin https://github.com/${{ vars.REPO_HELM }}.git

          # Borra cualquier auth previa
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --local --unset-all http.https://github.com/.extraheader || true

          # Inyecta auth con el PAT
          AUTH="$(printf "x-access-token:${{ secrets.DEPLOY_REPO_PAT }}" | base64 -w0)"
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${AUTH}"

          # Debug útil (no imprime token)
          git config --local --get remote.origin.url

      - name: Debug token permissions
        working-directory: deploy
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_PAT }}
        run: |
          echo "Token user:"
          curl -s -H "Authorization: token ${GH_TOKEN}" https://api.github.com/user | jq -r '.login'
          echo "Repo perms:"
          curl -s -H "Authorization: token ${GH_TOKEN}" https://api.github.com/repos/${{ vars.REPO_HELM }} | jq -r '.full_name, .permissions'

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update values (dev)
        working-directory: deploy
        run: |
          FILE="environments/dev/${{ vars.APP_NAME }}-values.yaml"
          yq -i '.image.repository = "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.APP_NAME }}"' "$FILE"
          yq -i '.image.tag = "${{ steps.vars.outputs.tag }}"' "$FILE"
          git diff

      - name: Create PR to deploy repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DEPLOY_REPO_PAT }}
          path: deploy
          branch: pr-gitops-dev-${{ steps.vars.outputs.tag }}
          title: "deploy(dev): ${{ vars.APP_NAME }}:${{ steps.vars.outputs.tag }}"
          commit-message: "deploy(dev): ${{ vars.APP_NAME }}:${{ steps.vars.outputs.tag }}"
          body: |
            Automated GitOps update:
            - image.repository = docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.APP_NAME }}
            - image.tag = ${{ steps.vars.outputs.tag }}
          base: gitops
          delete-branch: true